<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0;}
        .card{
            width:300px;
            margin:0 auto;
            position:relative;
        }
        .card-front,.card-back{
            height:200px;            
            border-radius:10px;
            background:lightcoral;
            backface-visibility:hidden;

            font-size:50px;
            line-height:200px;
            text-align:center;
        }
        .card-front{
            position:relative;
            z-index:100;            
        }
        .card-back{
            position:absolute;
            left:0;
            right:0;
            top:0;
            bottom:0;
            z-index:99;
            transform:rotateY(180deg);

            background:lightgreen;
        }

        

        .box{
            perspective:300px;
        }
        .card{
            transform-style:preserve-3d;
            transition:1s;
        }
        .box:hover .card{
            transform:rotateX(180deg);
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="card">
            <div class="card-front">
                CARD Front
            </div>
            <div class="card-back">
                CARD Back
            </div>
        </div>
    </div>
</body>
</html>
