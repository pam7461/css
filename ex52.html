<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .card{
            width:300px;
            margin:100px auto;
        }
        .front,.back{
            height:200px;            
            border-radius:10px;
            background-image:linear-gradient(35deg,rgba(255,0,0,0.5),rgba(0,0,255,0.5));
            font-weight:700;
            font-size:3em;
            color:white;
            text-align:center;
            line-height:200px;
        }
        .back{
            background-color:black;
        }
        

        
    </style>
</head>
<body>
    <div class="card">
        <div class="front">앞면</div>
        <div class="back">뒷면</div>
    </div>
</body>
</html>
