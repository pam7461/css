<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        nav{
            width:1200px;
            margin-left:auto;
            margin-right:auto;
            background-color:rgba(0,0,0,0.2);
        }
        span{
            display:inline-block;
            width:200px;
            font-size:24px;
            text-align:center;
        }



        span:nth-child(1){
            background-color:red;
        }
    </style>
</head>
<body>
    <nav>
        <span>menu</span><span>hollys mall</span><span>membership</span><span>hollys news</span><span>store</span><span>hollys is</span>
    </nav>
</body>
</html>
