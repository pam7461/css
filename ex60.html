<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box01{
            width:100px;
            height:100px;            
            border:1px solid black;
            transition:1s;
        }
        .par:hover .box01{
            margin-left:500px;
        }


        /* 애니메이션 */
        @keyframes well-e {
            0%{margin-left:0;}
            100%{margin-left:500px;}
        }
        @keyframes well-e2 {
            0%{margin-left:500px;}
            100%{margin-left:0;}
        }

        .box01{
            animation-name:well-e ;
            animation-duration: 1s;
        }
        .box02{
            animation-name:well-e2;
            animation-duration: 1s;
        }
        .box03{
            animation-name:well-e ;
            animation-duration: 1s;
            animation-delay: 1s;
        }
        .box04{
            animation-name:well-e ;
            animation-duration:1s;
            animation-delay:1s;
            animation-iteration-count:infinite;
        }
        .box05{
            animation-name:well-e ;
            animation-duration: 1s;
            animation-delay: 1s;
            animation-iteration-count:infinite;
            animation-direction:reverse;
        }
        .box05{
            animation-name:well-e ;
            animation-duration: 1s;
            animation-delay: 1s;
            animation-iteration-count:infinite;
            animation-direction:reverse;
        }
        .box07{
            animation-name:well-e ;
            animation-duration: 1s;
            animation-delay: 1s;
            animation-iteration-count:infinite;
            animation-direction:reverse;
            animation-timing-function:linear;
        }
        .box10{
            animation-name:well-e;
            animation-duration: 1s;
            animation-fill-mode: forwards;            
        }
    </style>
</head>
<body>
    <div class="par">
        <div class="box box01">box01</div>
    </div>
    <div class="box box02">box02</div>
    <div class="box box03">box03</div>
    <div class="box box04">box04</div>
    <div class="box box05">box05</div>
    <div class="box box06">box06</div>
    <div class="box box07">box07</div>
    <div class="box box08">box08</div>
    <div class="box box09">box09</div>
    <div class="box box10">box10</div>
</body>
</html>
