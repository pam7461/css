<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .grid{
            display:flex;
            flex-flow:row nowrap;
            justify-content:space-between;

            box-sizing:border-box;
            width:1200px;
            height:100px;
            margin:0 auto;
            padding:0 20px;
            background:lightgray;
        }
        .col{
            width:82px;            
            background:lightpink;
        }
    </style>
</head>
<body>
    <div class="grid">
        <div class="col col01"></div>
        <div class="col col02"></div>
        <div class="col col03"></div>
        <div class="col col04"></div>
        <div class="col col05"></div>
        <div class="col col06"></div>
        <div class="col col07"></div>
        <div class="col col08"></div>
        <div class="col col09"></div>
        <div class="col col10"></div>
        <div class="col col11"></div>
        <div class="col col12"></div>
    </div>
</body>
</html>
