<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS의 정의</title>   
    <link rel="stylesheet" href="./style01.css">
</head>
<body>
    <h1>CSS의 정의</h1>
    <p><strong>CSS(Cascading Style Sheets)</strong></p>
    <h2>특징</h2>
    <ol>
        <li>상속</li>
    </ol>
    <h2>종류</h2>
    <ol>
        <li>인라인스타일</li>
        <li>내부스타일</li>
        <li>외부스타일</li>
    </ol>
    <h2>스타일 우선순위</h2>
    <p><strong>대전제</strong>우선 순위가 같으면 나중에 나온 스타일이 우선한다.</p>
    <ol>
        <li>중요스타일</li>
        <li>인라인스타일</li>
        <li>아이디</li>
        <li>클래스</li>
        <li>테그</li>
    </ol>
</body>
</html>
