<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{box-sizing: border-box;margin: 0;padding: 0;}
        .gra-box{
            width:500px;
            height:500px;
            margin:100px auto;
            border:1px solid black;
            background-image:linear-gradient(90deg,rgba(255,0,0,0.5) 20%,green 50%,blue 70%);
        }
        .rad-box{
            width:500px;
            height:250px;
            margin:100px auto;
            border:1px solid black; 
            background-image:radial-gradient(circle,red,green,blue);           
        }
        .rep-box{
            width:500px;
            height:500px;
            margin:100px auto;
            border:1px solid black; 
            background-image:repeating-linear-gradient(90deg,red 10%,green 20%,blue 30%)       
        }
    </style>
</head>
<body>
    <div class="gra-box"></div>
    <div class="rad-box"></div>
    <div class="rep-box"></div>
</body>
</html>
