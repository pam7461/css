<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0;}
        .img-box{
            width:600px;
            height:400px;
            margin:0 auto;
            border:1px solid black;
            overflow:hidden;
            background:lightcoral;
        }
        img{
            width:300px;
            height:300px;
            object-fit:contain;
            object-position:10px top;
            mix-blend-mode:screen;
        }
    </style>
</head>
<body>
    <div class="img-box">
        <img src="./images/flowers.jpg" alt="이미지">
    </div>
</body>
</html>
