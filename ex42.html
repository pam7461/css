<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            box-sizing:border-box;
            margin:0;
            padding:0;
        }
        .par-box:first-child{
            width:500px;
            height:500px;
            background:red;

            position:relative;
            left:0;            
            top:0;             
        }
        .par-box:nth-child(2){
            width:300px;
            height:300px;
            background:green;

            position:fixed;            
            right:0;            
            bottom:0;
        }
        .par-box:first-child .box01{
            position:fixed;
            right:-20px;
            top:100px;
        }
    </style>
</head>
<body>
    <div class="par-box">
        <div class="box box01">box01</div>
        <div class="box box02">box02</div>
        <div class="box box03">box03</div>
        <div class="box box04">box04</div>
        <div class="box box05">box05</div>
    </div>
    <div class="par-box">
        <div class="box box01">박스01</div>
        <div class="box box02">박스02</div>
        <div class="box box03">박스03</div>
        <div class="box box04">박스04</div>
        <div class="box box05">박스05</div>
    </div>
</body>
</html>
