<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        :root{
            font-family:'Noto Sans KR';
            color:white;
            color:#00ff00;
        }
        h1{
            /* font:24px/3em 'Noto Sans KR'; */
            font-size:24px;
            line-height:3em;
            color:#ff0000;
            color:#f00;
            color:#336699;
            color:#369;
            color:#f9f9f9;
        }
        h2{
            font:16px/2em 'Noto Sans KR';
            color:rgb(0,255,0);
        }
        h3{
            color:hsl(200,100%,50%);
        }
        h4{
            color:rgba(255,0,0,0.5)
        }
        h5{
            color:rgba(18,255,66,0.8);
        }
    </style>
</head>
<body>
    <h1>1 level</h1>
    <h2>2 level</h2>
    <h3>3 level</h3>
    <h4>4 level</h4>
    <h5>5 level</h5>
    <h6>6 level</h6>
    
</body>
</html>
