<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS의 정의</title>
</head>
<body>
    <h1>CSS의 정의</h1>
    <p><strong>CSS(Cascading Style Sheets)</strong></p>
    <h2>특징</h2>
    <ol>
        <li>상속</li>
    </ol>
    <h2>종류</h2>
    <ol style="color:#ff0000;">
        <li>인라인스타일</li>
        <li>내부스타일</li>
        <li>외부스타일</li>
    </ol>
    <h2>스타일 우선순위</h2>
    <ol style="color:#ff0000;">
        <li>1</li>
        <li>2</li>
        <li>3</li>
        <li>4</li>
        <li>5</li>
    </ol>
</body>
</html>
