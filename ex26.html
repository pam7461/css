<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .table{
            display:table;
        }
        .tr{
            display:table-row;
        }
        .td{
            display:table-cell;
            border:1px solid black;
        }
    </style>
</head>
<body>
    <div class="table">
        <div class="tr">
            <div class="td">1-1</div>
            <div class="td">1-2</div>
        </div>
        <div class="tr">
            <div class="td">2-1</div>
            <div class="td">2-2</div>
        </div>
    </div>
</body>
</html>
