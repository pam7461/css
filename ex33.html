<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* CSS Reset */
        *{box-sizing:border-box;margin:0;padding:0;}


        /* Set */
        .clearfix::after{
            content:'';
            display:block;
            clear:both;
        }
        .f-left{float:left;}
        .f-right{float:right;}


        /* 문서,사이트 Style */
        .par-box{
            width:600px;
            margin:0 auto;
            background-color:rgba(0,0,0,0.2);
        }
        .box{
            width:100px;
            height:100px;
            background-color:red;
        }
        .box:first-child{float:left;}
        .box:last-child{float:right;}
        
    </style>
</head>
<body>
    <div class="par-box clearfix">
        <div class="box f-left"></div>
        <div class="box f-right"></div>    
    </div>

</html>
