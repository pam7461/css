<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .par-box{
            width:600px;
            margin:0 auto;
            background-color:rgba(0,0,0,0.2);
        }
        .box{
            width:100px;
            height:100px;
            background-color:red;
        }
        .box:first-child{float:left;}
        .box:last-child{float:right;}
    </style>
</head>
<body>
    <div class="par-box">
        <div class="box"></div>
        <div class="box"></div>
    </div>
